services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: noteflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-noteflow}
      MYSQL_USER: ${DB_USERNAME:-noteflow}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - noteflow-network

  # PHP-FPM (Laravel Backend)
  php-fpm:
    build:
      context: ./backend
      dockerfile: ../docker/php-fpm/Dockerfile
    container_name: noteflow-php
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - DB_HOST=mysql
      - DB_DATABASE=${DB_DATABASE:-noteflow}
      - DB_USERNAME=${DB_USERNAME:-noteflow}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
    volumes:
      - ./backend:/var/www/html
      - ./docker/php-fpm/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - noteflow-network

  # Laravel Reverb WebSocket server (real-time collaboration #24)
  reverb:
    build:
      context: ./backend
      dockerfile: ../docker/php-fpm/Dockerfile
    container_name: noteflow-reverb
    restart: unless-stopped
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_KEY=${APP_KEY}
      - DB_HOST=mysql
      - DB_DATABASE=${DB_DATABASE:-noteflow}
      - DB_USERNAME=${DB_USERNAME:-noteflow}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - BROADCAST_CONNECTION=reverb
      - REVERB_APP_ID=${REVERB_APP_ID:-noteflow}
      - REVERB_APP_KEY=${REVERB_APP_KEY:-noteflow-key}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET:-noteflow-secret}
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
    volumes:
      - ./backend:/var/www/html
    ports:
      - "${REVERB_HOST_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - noteflow-network

  # Nginx (Reverse Proxy for Backend + Static Frontend)
  nginx:
    image: nginx:alpine
    container_name: noteflow-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./backend/public:/var/www/html/public
      - ./backend/storage/app/public:/var/www/html/public/storage
      - ./frontend/dist:/var/www/html/frontend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php-fpm
      - reverb
    networks:
      - noteflow-network

volumes:
  mysql_data:
    driver: local

networks:
  noteflow-network:
    driver: bridge
