services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: noteflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-noteflow}
      MYSQL_USER: ${DB_USERNAME:-noteflow}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root-secret}
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # MySQL performance tuning (InnoDB buffer, query cache, etc.)
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root-secret}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - noteflow-network

  # Redis — in-memory cache + queue broker
  redis:
    image: redis:7-alpine
    container_name: noteflow-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --appendonly no
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - noteflow-network

  # PHP-FPM (Laravel Backend)
  php-fpm:
    build:
      context: ./backend
      dockerfile: ../docker/php-fpm/Dockerfile
    container_name: noteflow-php
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - DB_HOST=mysql
      - DB_DATABASE=${DB_DATABASE:-noteflow}
      - DB_USERNAME=${DB_USERNAME:-noteflow}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
      - BROADCAST_CONNECTION=reverb
      - REVERB_APP_ID=${REVERB_APP_ID:-noteflow}
      - REVERB_APP_KEY=${REVERB_APP_KEY:-noteflow-key}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET:-noteflow-secret}
      - REVERB_HOST=reverb
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
      - ./docker/php-fpm/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - noteflow-network

  # Queue worker — processes jobs from Redis queue
  queue-worker:
    build:
      context: ./backend
      dockerfile: ../docker/php-fpm/Dockerfile
    container_name: noteflow-queue
    restart: unless-stopped
    command: [ "php", "artisan", "queue:work", "redis", "--sleep=3", "--tries=3", "--max-time=3600" ]
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-false}
      - DB_HOST=mysql
      - DB_DATABASE=${DB_DATABASE:-noteflow}
      - DB_USERNAME=${DB_USERNAME:-noteflow}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=redis
      - BROADCAST_CONNECTION=reverb
      - REVERB_APP_ID=${REVERB_APP_ID:-noteflow}
      - REVERB_APP_KEY=${REVERB_APP_KEY:-noteflow-key}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET:-noteflow-secret}
      - REVERB_HOST=reverb
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
      - ./docker/php-fpm/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - noteflow-network

  # Laravel Reverb WebSocket server (real-time collaboration #24)
  reverb:
    build:
      context: ./backend
      dockerfile: ../docker/php-fpm/Dockerfile
    container_name: noteflow-reverb
    restart: unless-stopped
    command: [ "php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080" ]
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-false}
      - DB_HOST=mysql
      - DB_DATABASE=${DB_DATABASE:-noteflow}
      - DB_USERNAME=${DB_USERNAME:-noteflow}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - BROADCAST_CONNECTION=reverb
      - REVERB_APP_ID=${REVERB_APP_ID:-noteflow}
      - REVERB_APP_KEY=${REVERB_APP_KEY:-noteflow-key}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET:-noteflow-secret}
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    ports:
      - "${REVERB_HOST_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - noteflow-network

  # Nginx (Reverse Proxy for Backend + Static Frontend)
  nginx:
    image: nginx:alpine
    container_name: noteflow-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./backend/public:/var/www/html/public
      - ./backend/storage/app/public:/var/www/html/public/storage
      - ./frontend/dist:/var/www/html/frontend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/gzip.conf:/etc/nginx/conf.d/gzip.conf:ro
    depends_on:
      - php-fpm
      - reverb
    networks:
      - noteflow-network

  # phpMyAdmin — database management tool
  phpmyadmin:
    image: phpmyadmin:latest
    profiles: ["tools"]
    container_name: noteflow-phpmyadmin
    restart: unless-stopped
    environment:
      - PMA_HOST=mysql
      - PMA_USER=${DB_USERNAME:-noteflow}
      - PMA_PASSWORD=${DB_PASSWORD:-secret}
      - PMA_ARBITRARY=0
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    networks:
      - noteflow-network
    depends_on:
      mysql:
        condition: service_healthy

  # Tooling container for building frontend
  frontend-builder:
    image: node:18-alpine
    profiles: ["tools"]
    volumes:
      - ./frontend:/app
      - ./.env:/app/.env
    working_dir: /app
    command: sh -c "npm install && npm run build"
    networks:
      - noteflow-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  backend_vendor:
    driver: local

networks:
  noteflow-network:
    driver: bridge
