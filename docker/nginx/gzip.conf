# ─── Gzip Compression ─────────────────────────────────────────────────────
# Typically reduces text-based response sizes by 60-80%.
# Placed in a separate file so it can be included per-server or globally.

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 256;
gzip_http_version 1.1;

gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/x-javascript
    application/xml
    application/xml+rss
    application/vnd.ms-fontobject
    font/opentype
    font/ttf
    font/woff
    font/woff2
    image/svg+xml
    image/x-icon;
