map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php index.html;

    # API proxy to PHP-FPM
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Sanctum CSRF endpoint
    location /sanctum {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Broadcasting auth (private/presence channels) — handled by Laravel
    location /broadcasting {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Storage (uploaded avatars + attachments)
    location ^~ /storage/ {
        root /var/www/html/public;
        try_files $uri =404;
    }

    # Laravel health check
    location /up {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Reverb WebSocket endpoint (rubric #24 real-time collaboration)
    location /app/ {
        proxy_pass http://reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # PHP-FPM handler
    location ~ \.php$ {
        fastcgi_pass php-fpm:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Static frontend (React build) — serves the SPA for all non-API routes
    location / {
        root /var/www/html/frontend;
        try_files $uri $uri/ /index.html;
    }

    # Hide .htaccess and .env files
    location ~ /\. {
        deny all;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /var/www/html/frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
