[PHP]
memory_limit = 256M
upload_max_filesize = 20M
post_max_size = 25M
max_execution_time = 60
display_errors = Off
log_errors = On
error_log = /proc/self/fd/2

; ─── OPcache ──────────────────────────────────────────────────────────────
; Precompiles PHP scripts into shared memory, avoiding repeated parsing.
; This typically provides a 40-50% latency reduction on PHP-FPM workloads.
[opcache]
opcache.enable = 1
opcache.memory_consumption = 256
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 1
; In production set revalidate_freq = 0 and use `php artisan opcache:clear`
; after deploys. In dev, keep it at 2 so code changes are picked up quickly.
opcache.revalidate_freq = 2
opcache.interned_strings_buffer = 16
opcache.fast_shutdown = 1
; Preload Laravel's bootstrap (production only, optional)
; opcache.preload = /var/www/html/bootstrap/preload.php
; opcache.preload_user = www-data

; ─── Realpath cache ───────────────────────────────────────────────────────
; Avoids repeated stat() calls for the same file path.
realpath_cache_size = 4096K
realpath_cache_ttl = 600
